#===============================================
# Description: Build acctl using OpenWrt SDK (no toolchain compile, minimal disk)
# File name: acctl-sdk-build.yml
# Lisence: MIT
# Author: bhrq12
# Source: bhrq12/lede v2025.5.22 (lean fork)
# Target: ipq4018 / alibaba_ap4220-128m
#===============================================

name: acctl SDK Build

on:
  workflow_dispatch:
    inputs:
      acctl_version:
        description: 'acctl git ref'
        required: false
        default: 'main'
        type: string

env:
  SOURCE_URL: https://github.com/bhrq12/lede.git
  SOURCE_BRANCH: v2025.5.22
  ACCTL_REPO: https://github.com/bhrq12/acctl-x.git
  ACCTL_BRANCH: ${{ inputs.acctl_version || 'main' }}
  SDK_VERSION: 23.05.5
  SDK_TARGET: ipq40xx
  SDK_SUBTARGET: generic
  DEVICE_TARGET: ipq40xx_generic
  DEVICE_SUBTARGET: alibaba_ap4220-128m
  BUILD_JOBS: 2
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Clean disk junk
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /etc/mysql /etc/php \
            /usr/local/lib/android /usr/share/hunspell /usr/share/icons /var/cache/*
          df -hT /

      - name: Install build deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install --no-install-recommends \
            build-essential clang gcc g++ gawk git libncurses5-dev libssl-dev \
            python3 python3-setuptools rsync unzip xz-utils zstd quilt \
            bc binutils bzip2 cpio flex gzip perl findutils gettext autopoint \
            help2man m4 patch texinfo which curl wget

      - name: Check disk before SDK download
        run: |
          FREE_KB=$(df --output=avail -B1K / | tail -1)
          FREE_GB=$(expr $FREE_KB / 1000000)
          echo "Free: ${FREE_GB}GB"
          df -hT /

      - name: Download OpenWrt SDK
        run: |
          # SDK文件名中的GCC版本必须精确匹配
          SDK_NAME="openwrt-sdk-23.05.5-ipq40xx-generic_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz"
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/ipq40xx/generic/${SDK_NAME}"
          SDK_SHA256_URL="${SDK_URL}.sha256"

          echo "SDK URL: $SDK_URL"
          echo "Downloading... (this takes ~3-5 minutes)"

          curl -fsSL --retry 3 --retry-delay 15 --connect-timeout 60 \
            -o "sdk.tar.xz" "$SDK_URL"

          echo "Downloaded: $(du -sh sdk.tar.xz)"
          ls -lh sdk.tar.xz

      - name: Verify SDK checksum
        run: |
          EXPECTED=$(curl -fsSL "$SDK_SHA256_URL" | awk '{print $1}')
          ACTUAL=$(sha256sum sdk.tar.xz | awk '{print $1}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then echo "CHECKSUM MISMATCH"; exit 1; fi
          echo "SDK checksum OK"

      - name: Extract SDK
        run: |
          mkdir -p openwrt-sdk
          tar -xf sdk.tar.xz -C openwrt-sdk --strip-components=1
          rm sdk.tar.xz
          echo "SDK extracted: $(du -sh openwrt-sdk)"
          ls openwrt-sdk/
          df -hT /

      - name: Clean disk after SDK extract
        run: |
          sudo apt-get -qq clean
          df -hT /

      - name: Clone lean source (for .config and feeds.conf.default)
        run: |
          git clone $SOURCE_URL -b $SOURCE_BRANCH --depth=1 lean-src
          cd lean-src
          # Copy feeds.conf.default
          cp feeds.conf.default ../openwrt-sdk/feeds.conf.default 2>/dev/null || true
          # Copy AP4220 config
          cp configs/AP4220-config.config ../openwrt-sdk/.config
          echo "CONFIG_ALL=y" >> ../openwrt-sdk/.config
          echo "CONFIG_ALL_NONSHARED=y" >> ../openwrt-sdk/.config
          echo "Config lines: $(wc -l < ../openwrt-sdk/.config)"
          cd ..
          rm -rf lean-src

      - name: Install feeds (minimal - only needed for acctl)
        run: |
          cd openwrt-sdk
          # 只更新 packages 和 luci feed，不装 routing/telephony
          ./scripts/feeds update packages luci
          # 只装 acctl 需要的依赖包，不装 -a（全量包）
          ./scripts/feeds install libuci-lua libjson-c luci luci-lib-web luci-lib-json
          echo "Feeds installed"
          ls package/feeds/packages/ | grep -E 'libuci|libjson' || echo "WARNING: deps not found"

      - name: Clone acctl-x into SDK
        run: |
          cd openwrt-sdk
          rm -rf package/acctl
          # acctl-x 的 Makefile 在 repo root，需要放到 package/acctl/ 下
          git clone $ACCTL_REPO -b $ACCTL_BRANCH --depth=1 package/acctl
          echo "=== acctl package structure ==="
          ls -la package/acctl/
          echo "--- Makefile first 10 lines ---"
          head -10 package/acctl/Makefile

      - name: Prepare SDK environment
        run: |
          cd openwrt-sdk
          # 确保 staging_dir 完整（SDK 自带 toolchain）
          echo "=== Staging dir ==="
          ls staging_dir/
          ls staging_dir/target-*/usr/include/ 2>/dev/null | head -5
          echo "=== Toolchain ==="
          ls staging_dir/toolchain-*/
          ls staging_dir/toolchain-*/bin/ 2>/dev/null | head -5
          # 运行 SDK 的 setup 脚本
          if [ -x scripts/feeds ]; then
            ./scripts/feeds update packages luci
            ./scripts/feeds install libuci-lua libjson-c luci luci-lib-web luci-lib-json
          fi
          # 确保 .config 正确
          make defconfig 2>/dev/null || true
          echo "SDK ready"

      - name: Compile acctl
        id: compile
        run: |
          cd openwrt-sdk
          echo "=== Compiling acctl with $(nproc) threads ==="
          make package/acctl/compile V=99 -j$(nproc) 2>&1 | tee compile.log
          EXIT=$?
          echo "Exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "=== Single thread retry ==="
            make package/acctl/compile V=s -j1 2>&1 | tee compile-single.log
          fi

      - name: Debug compile result
        run: |
          cd openwrt-sdk
          echo "=== Build directories ==="
          find build_dir -name 'acctl*' 2>/dev/null | head -10
          find . -name '*.ipk' -path '*/acctl*' 2>/dev/null
          echo "=== staging_dir check ==="
          ls staging_dir/target-*/usr/lib/libuci* 2>/dev/null || echo "No libuci found"
          ls staging_dir/target-*/usr/lib/libjson* 2>/dev/null || echo "No libjson found"
          echo "=== Last 30 lines of compile.log ==="
          tail -30 compile.log 2>/dev/null || tail -30 compile-single.log 2>/dev/null

      - name: Check compile result
        run: |
          cd openwrt-sdk
          IPK=$(find bin -name 'acctl*.ipk' 2>/dev/null | head -1)
          if [ -n "$IPK" ]; then
            echo "SUCCESS: $IPK"
            echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          else
            echo "FAILED: no acctl.ipk found"
            echo "Exit 1"
            exit 1
          fi

      - name: Upload acctl.ipk artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: acctl-ipk-${{ env.DEVICE_SUBTARGET }}
          path: openwrt-sdk/bin/packages/*/base/acctl*.ipk
          retention-days: 30

      - name: Build summary
        if: success()
        run: |
          echo "=== Build Success ==="
          ls -lh openwrt-sdk/bin/packages/*/base/acctl*.ipk
          df -hT /
